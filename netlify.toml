[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite"
  targetPort = 3000
  port = 9001
  autoLaunch = false

[functions]
  external_node_modules = ["@anthropic-ai/sdk"]
  node_bundler = "esbuild"

[functions."api-claude"]
  # Claude Sonnet vision (phase 5) can take 20-40s
  timeout = 26

[functions."api-recraft"]
  # Recraft SVG generation + fetch
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP: blocks inline scripts (protects against SVG/XSS injection).
    # style-src 'unsafe-inline' required — SVG editor injects <style> tags dynamically.
    # wasm-unsafe-eval required — VTracer WASM (phase 4, manual vectorizer).
    # nominatim.openstreetmap.org — geo-context autocomplete in settings.
    # pictos.net + next.pictos.net — admin.html consulta api-usage-report en ambos deploys.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://nominatim.openstreetmap.org https://pictos.net https://next.pictos.net; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/assets/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Content-Type = "image/svg+xml"

[build.environment]
  NODE_VERSION = "18"
