
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/pictos-iso.svg">
  <title>PICTOS · generative pictograms for AAC</title>
  <link rel="preload" as="font" type="font/ttf" href="/fonts/Lexend.ttf" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Self-hosted Lexend (variable font). Same TTF is reused by the PDF
       export service (see services/pdfExportService.ts), so a single file
       on disk serves both the UI and printable output. */
    @font-face {
      font-family: 'Lexend';
      src: url('/fonts/Lexend.ttf') format('truetype-variations'),
           url('/fonts/Lexend.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --primary-dark: #1e1b4b;
      --furious-orange: #f97316; 
    }
    
    * {
      font-family: 'Lexend', sans-serif !important;
    }
    
    .mono, .mono * { 
      font-family: 'Fira Code', monospace !important; 
    }
    
    body { 
      background-color: #f8fafc;
      color: #0f172a;
      margin: 0;
    }

    @keyframes spectral-pulse {
      0% { background-color: var(--furious-orange); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
      33% { background-color: #06b6d4; }
      66% { background-color: #6366f1; }
      100% { background-color: var(--furious-orange); box-shadow: 0 0 0 12px rgba(99, 102, 241, 0); }
    }
    
    #tagline{
     display: block;
      line-height: 100%;
      margin-top: .6ex;
    }

    .animate-spectral {
      animation: spectral-pulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-reduced-motion: reduce) {
      .animate-spectral,
      .animate-pulse,
      .animate-spin {
        animation: none !important;
      }
      * {
        transition-duration: 0.01ms !important;
      }
    }

    /* App-level animation disable (user preference toggle) */
    .reduce-motion .animate-spectral,
    .reduce-motion .animate-pulse,
    .reduce-motion .animate-spin {
      animation: none !important;
    }
    .reduce-motion * {
      transition-duration: 0.01ms !important;
    }

    /* Focus-visible: keyboard-only focus indicators (WCAG 2.4.7) */
    *:focus-visible {
      outline: 2px solid #6366f1;
      outline-offset: 2px;
    }
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px #6366f1;
    }

    /* Scrollbars técnicos */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .utterance-title {
      font-size: 1.2em !important;
      font-weight: 300 !important;
      letter-spacing: 0.01ex !important; /* Interletra ajustada al mínimo */
      text-transform: uppercase;
    }

    .picto-chip {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      padding: 1.9px 7.9px;
      font-weight: 500;
      font-size: 0.75rem;
      color: #1e293b;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-bottom: 2px solid #94a3b8;
    }
    
    /* Etiquetas normalizadas: gris neutro y peso suavizado para legibilidad */
    .nlu-key { color: #64748b !important; font-weight: 500 !important; text-transform: uppercase; font-size: 0.6875rem; letter-spacing: 0.05ex; }
    .nlu-val { color: #1e293b; font-weight: 400; font-size: 0.75rem; }

    /* Estilos para el Modal de Vista Enfocada */
    .focus-modal-backdrop {
      position: fixed;
      inset: 0;
      background-color: rgba(15, 23, 42, 0.8);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .focus-modal-content {
      background-color: #f8fafc;
      width: 90%;
      height: 90%;
      max-width: 1400px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }

    /* High-contrast mode (WCAG 1.4.11) */
    .high-contrast body {
      background-color: #fff;
      color: #000;
    }
    .high-contrast header,
    .high-contrast main,
    .high-contrast aside,
    .high-contrast nav,
    .high-contrast button,
    .high-contrast input,
    .high-contrast textarea,
    .high-contrast select {
      border-color: #000 !important;
    }
    .high-contrast .text-slate-300,
    .high-contrast .text-slate-400,
    .high-contrast .text-slate-500 {
      color: #1e293b !important;
    }
    .high-contrast .bg-slate-50 {
      background-color: #fff !important;
    }
    .high-contrast .border-slate-100,
    .high-contrast .border-slate-200 {
      border-color: #475569 !important;
    }
  </style>

</head>
<body class="bg-slate-50 text-slate-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
