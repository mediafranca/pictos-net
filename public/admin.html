<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>PictoNet — Uso de API</title>
<link rel="preload" as="font" type="font/ttf" href="/fonts/Lexend.ttf" crossorigin>
<style>
  /* Design system PictoNet (ver styles/variables.css) */
  @font-face {
    font-family: 'Lexend';
    src: url('/fonts/Lexend.ttf') format('truetype-variations'),
         url('/fonts/Lexend.ttf') format('truetype');
    font-weight: 100 900;
    font-display: swap;
  }
  :root {
    --color-primary: #40069e;
    --color-primary-light: #7c3aed;
    --color-primary-pale: #ede9fe;
    --color-slate-50: #f8fafc;
    --color-slate-100: #f1f5f9;
    --color-slate-200: #e2e8f0;
    --color-slate-300: #cbd5e1;
    --color-slate-400: #94a3b8;
    --color-slate-500: #64748b;
    --color-slate-600: #475569;
    --color-slate-700: #334155;
    --color-slate-900: #0f172a;
    --color-success: #10b981;
    --color-error: #dc2626;
    --color-error-light: #fee2e2;
    --color-warning: #ea580c;
    --color-warning-light: #ffedd5;
    --border-radius-md: 0.375rem;
    --border-radius-lg: 0.5rem;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lexend', system-ui, sans-serif;
    background: var(--color-slate-50); color: var(--color-slate-900);
    min-height: 100vh; padding: 2rem 1rem;
  }
  .wrap { max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--color-primary); }
  h1 small { color: var(--color-slate-500); font-weight: 400; font-size: 0.8rem; margin-left: 0.5rem; }
  .panel {
    background: #fff; border: 1px solid var(--color-slate-200);
    border-radius: var(--border-radius-lg); box-shadow: var(--shadow-sm);
    padding: 1.25rem; margin-bottom: 1rem;
  }
  /* --- Login --- */
  #login { max-width: 380px; margin: 10vh auto; text-align: center; box-shadow: var(--shadow-md); }
  #login p { color: var(--color-slate-500); font-size: 0.85rem; }
  #login input {
    width: 100%; padding: 0.6rem 0.8rem; margin: 1rem 0 0.75rem;
    background: #fff; border: 1px solid var(--color-slate-300);
    border-radius: var(--border-radius-md); color: var(--color-slate-900); font-size: 0.95rem;
    font-family: inherit;
  }
  #login input:focus { outline: 2px solid var(--color-primary-light); border-color: transparent; }
  button {
    background: var(--color-primary); color: #fff; border: none;
    border-radius: var(--border-radius-md); padding: 0.55rem 1.1rem;
    font-size: 0.875rem; font-family: inherit; cursor: pointer;
    transition: background 150ms;
  }
  button:hover { background: #000; }
  button.ghost {
    background: transparent; color: var(--color-slate-500);
    border: 1px solid var(--color-slate-300);
  }
  button.ghost:hover { background: var(--color-slate-100); color: var(--color-slate-700); }
  button:disabled { opacity: 0.5; cursor: wait; }
  .error { color: var(--color-error); font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }
  /* --- Toolbar --- */
  .toolbar { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .toolbar select {
    background: #fff; color: var(--color-slate-900);
    border: 1px solid var(--color-slate-300); border-radius: var(--border-radius-md);
    padding: 0.5rem; font-family: inherit; font-size: 0.875rem;
  }
  .toolbar .spacer { flex: 1; }
  #status { color: var(--color-slate-500); font-size: 0.85rem; }
  /* --- KPIs --- */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
  .kpi {
    background: #fff; border: 1px solid var(--color-slate-200);
    border-radius: var(--border-radius-lg); box-shadow: var(--shadow-sm); padding: 1rem;
  }
  .kpi .label {
    color: var(--color-slate-500); font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .kpi .value { font-size: 1.6rem; font-weight: 600; margin-top: 0.25rem; color: var(--color-primary); }
  /* --- Gráfico SVG --- */
  #chart-box svg { width: 100%; height: auto; display: block; }
  .legend { display: flex; gap: 1rem; margin-bottom: 0.75rem; font-size: 0.8rem; color: var(--color-slate-600); }
  .legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 0.35rem; }
  /* --- Tabla --- */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { text-align: left; padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--color-slate-200); }
  th {
    color: var(--color-slate-500); font-weight: 500; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .bar { background: var(--color-slate-200); border-radius: 4px; height: 6px; min-width: 60px; overflow: hidden; }
  .bar > div { height: 100%; border-radius: 4px; background: var(--color-success); }
  .bar.warn > div { background: var(--color-warning); }
  .bar.danger > div { background: var(--color-error); }
  .pill {
    display: inline-block; font-size: 0.7rem; padding: 0.125rem 0.5rem;
    border-radius: 12px; background: var(--color-primary-pale);
    color: var(--color-primary); margin-right: 0.25rem;
  }
  .domain-fail {
    color: var(--color-error); background: var(--color-error-light);
    border-radius: var(--border-radius-md); padding: 0.4rem 0.6rem;
    font-size: 0.8rem; margin-top: 0.75rem;
  }
  .muted { color: var(--color-slate-500); }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">

  <!-- Pantalla de login: pide la ADMIN_API_KEY (actúa como password).
       La validación real la hace api-usage-report: si la clave es
       incorrecta responde 401 y no se muestra nada. -->
  <div id="login" class="panel">
    <h1>PictoNet — Uso de API</h1>
    <p>Ingresa la clave de administración</p>
    <input type="password" id="apikey" placeholder="ADMIN_API_KEY" autocomplete="off">
    <button id="btn-login">Entrar</button>
    <div class="error" id="login-error"></div>
  </div>

  <!-- Dashboard (oculto hasta autenticar) -->
  <div id="dash" class="hidden">
    <h1>PictoNet — Uso de API <small>pictos.net + next.pictos.net</small></h1>

    <div class="toolbar">
      <select id="range">
        <option value="7">Últimos 7 días</option>
        <option value="14" selected>Últimos 14 días</option>
        <option value="30">Últimos 30 días</option>
      </select>
      <button id="btn-refresh">Actualizar</button>
      <span id="status"></span>
      <span class="spacer"></span>
      <button class="ghost" id="btn-logout">Salir</button>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="label">Llamadas</div><div class="value" id="kpi-calls">—</div></div>
      <div class="kpi"><div class="label">Unidades</div><div class="value" id="kpi-units">—</div></div>
      <div class="kpi"><div class="label">Usuarios</div><div class="value" id="kpi-users">—</div></div>
      <div class="kpi"><div class="label">Errores</div><div class="value" id="kpi-errors">—</div></div>
    </div>

    <div class="panel" id="chart-box">
      <div class="legend" id="chart-legend"></div>
      <div id="chart"></div>
      <div id="domain-errors"></div>
    </div>

    <div class="panel">
      <table>
        <thead>
          <tr>
            <th>Usuario</th>
            <th class="num">Llamadas</th>
            <th class="num">Unidades</th>
            <th>Consumo máx. diario (tope <span id="limit-label">50</span>)</th>
            <th>Fases</th>
            <th>Dominios</th>
            <th class="num">Errores</th>
          </tr>
        </thead>
        <tbody id="user-rows"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- JS externo: la CSP del sitio (script-src 'self') no permite scripts inline -->
<script src="/admin.js"></script>
</body>
</html>
